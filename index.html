<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Deteksi Aktivitas</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        #log-container { background: #f4f4f4; padding: 15px; height: 350px; overflow-y: auto; border: 1px solid #ccc; font-family: monospace; font-size: 14px; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #ddd; padding-bottom: 2px; }
        .warning { color: #d32f2f; font-weight: bold; }
        .info { color: #1976d2; }
    </style>
</head>
<body>
    <h2>Halaman Uji Pengawasan Aktivitas</h2>
    <p>Halaman ini akan mencatat setiap kali Anda mencoba berpindah tab, membuka aplikasi lain, memindahkan kursor keluar dari jendela, atau melakukan manipulasi teks (copy/paste).</p>
    
    <div id="log-container"></div>

    <script>
        const logContainer = document.getElementById('log-container');

        function recordLog(message, isWarning = false) {
            const timeStamp = new Date().toLocaleTimeString();
            const logElement = document.createElement('div');
            logElement.className = `log-entry ${isWarning ? 'warning' : 'info'}`;
            logElement.textContent = `[${timeStamp}] ${message}`;
            logContainer.prepend(logElement);
        }

        // 1. Deteksi visibilitas tab (Page Visibility API)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                recordLog('Pelanggaran: Tab peramban disembunyikan atau di-minimize!', true);
            } else {
                recordLog('Info: Tab peramban kembali aktif.');
            }
        });

        // 2. Deteksi fokus jendela sistem operasi (Focus/Blur)
        window.addEventListener('blur', () => {
            recordLog('Pelanggaran: Jendela peramban kehilangan fokus (beralih ke aplikasi lain)!', true);
        });

        window.addEventListener('focus', () => {
            recordLog('Info: Jendela peramban kembali mendapatkan fokus.');
        });

        // 3. Deteksi kursor meninggalkan area dokumen (Mouse Leave)
        document.addEventListener('mouseleave', () => {
            recordLog('Peringatan: Kursor mouse meninggalkan area viewport halaman!', true);
        });

        // 4. Deteksi manipulasi *clipboard* (Copy, Cut, Paste)
        document.addEventListener('copy', () => recordLog('Pelanggaran: Aktivitas penyalinan (Copy) terdeteksi!', true));
        document.addEventListener('cut', () => recordLog('Pelanggaran: Aktivitas pemotongan (Cut) terdeteksi!', true));
        document.addEventListener('paste', () => recordLog('Pelanggaran: Aktivitas penempelan (Paste) terdeteksi!', true));

        // 5. Pencegahan dan deteksi klik kanan (Context Menu)
        document.addEventListener('contextmenu', (event) => {
            event.preventDefault();
            recordLog('Peringatan: Akses klik kanan dinonaktifkan sistem!', true);
        });
    </script>
</body>
</html>
